<!DOCTYPE html>
<html>
<head>
    <title>Test Job Extraction</title>
</head>
<body>
    <h1>Test Job Extraction API</h1>
    <input type="text" id="jobUrl" placeholder="Enter job URL" style="width: 400px;">
    <button onclick="testExtraction()">Extract Job Details</button>
    <div id="result"></div>

    <script>
        async function testExtraction() {
            const url = document.getElementById('jobUrl').value;
            if (!url) {
                alert('Please enter a job URL');
                return;
            }

            document.getElementById('result').innerHTML = 'Extracting...';

            try {
                const response = await fetch('/api/jobs/extract-details', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url }),
                });

                const data = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
