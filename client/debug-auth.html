<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .error { color: red; }
        .success { color: green; }
        .info { color: blue; }
        button { margin: 5px; padding: 10px 15px; }
        .token-display { 
            word-break: break-all; 
            background: #f5f5f5; 
            padding: 10px; 
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🔐 Authentication Debug Tool</h1>
    
    <div class="section">
        <h3>Current Auth State</h3>
        <button onclick="checkAuthState()">Check Current Auth State</button>
        <div id="authState"></div>
    </div>

    <div class="section">
        <h3>Token Analysis</h3>
        <button onclick="analyzeToken()">Analyze Token</button>
        <div id="tokenAnalysis"></div>
    </div>

    <div class="section">
        <h3>API Test</h3>
        <button onclick="testAPI()">Test API Call to /api/auth/me</button>
        <div id="apiTest"></div>
    </div>

    <div class="section">
        <h3>Actions</h3>
        <button onclick="clearAuth()">Clear Auth Data</button>
        <button onclick="window.location.href='/login'">Go to Login</button>
        <button onclick="window.location.href='/builder'">Go to Builder</button>
    </div>

    <script>
        function log(message, type = 'info') {
            const colors = { error: 'red', success: 'green', info: 'blue' };
            console.log(`%c${message}`, `color: ${colors[type]}`);
        }

        function displayResult(elementId, content) {
            document.getElementById(elementId).innerHTML = content;
        }

        function checkAuthState() {
            const token = localStorage.getItem('authToken');
            const user = localStorage.getItem('user');
            
            let result = '<h4>LocalStorage Contents:</h4>';
            result += `<p><strong>Token:</strong> ${token ? 'EXISTS' : 'MISSING'}</p>`;
            result += `<p><strong>User:</strong> ${user ? 'EXISTS' : 'MISSING'}</p>`;
            
            if (token) {
                result += `<div class="token-display"><strong>Token:</strong><br>${token}</div>`;
            }
            
            if (user) {
                try {
                    const userData = JSON.parse(user);
                    result += `<p><strong>User Data:</strong></p><pre>${JSON.stringify(userData, null, 2)}</pre>`;
                } catch (e) {
                    result += `<p class="error">Error parsing user data: ${e.message}</p>`;
                }
            }
            
            displayResult('authState', result);
            log('Auth state checked', 'info');
        }

        function analyzeToken() {
            const token = localStorage.getItem('authToken');
            let result = '<h4>Token Analysis:</h4>';
            
            if (!token) {
                result += '<p class="error">No token found</p>';
                displayResult('tokenAnalysis', result);
                return;
            }
            
            try {
                // Check if JWT
                const parts = token.split('.');
                result += `<p><strong>Token Parts:</strong> ${parts.length} (JWT should have 3)</p>`;
                
                if (parts.length === 3) {
                    // Decode JWT
                    const payload = JSON.parse(atob(parts[1]));
                    const currentTime = Date.now();
                    const expirationTime = payload.exp * 1000;
                    const isExpired = currentTime >= expirationTime;
                    
                    result += '<p class="success">✅ Valid JWT format</p>';
                    result += `<p><strong>Payload:</strong></p><pre>${JSON.stringify(payload, null, 2)}</pre>`;
                    result += `<p><strong>Current Time:</strong> ${new Date(currentTime).toISOString()}</p>`;
                    result += `<p><strong>Expiration Time:</strong> ${new Date(expirationTime).toISOString()}</p>`;
                    result += `<p><strong>Time Until Expiry:</strong> ${Math.round((expirationTime - currentTime) / 1000 / 60)} minutes</p>`;
                    result += `<p class="${isExpired ? 'error' : 'success'}"><strong>Is Expired:</strong> ${isExpired ? '❌ YES' : '✅ NO'}</p>`;
                } else {
                    result += '<p class="info">⚠️ Not JWT format (simple token)</p>';
                }
            } catch (error) {
                result += `<p class="error">❌ Error analyzing token: ${error.message}</p>`;
            }
            
            displayResult('tokenAnalysis', result);
            log('Token analyzed', 'info');
        }

        async function testAPI() {
            const token = localStorage.getItem('authToken');
            let result = '<h4>API Test Results:</h4>';
            
            if (!token) {
                result += '<p class="error">No token available for API test</p>';
                displayResult('apiTest', result);
                return;
            }
            
            try {
                result += '<p>🔄 Testing /api/auth/me...</p>';
                
                const response = await fetch('/api/auth/me', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                result += `<p><strong>Status:</strong> ${response.status} ${response.statusText}</p>`;
                
                const responseText = await response.text();
                let responseData;
                
                try {
                    responseData = JSON.parse(responseText);
                } catch (e) {
                    responseData = responseText;
                }
                
                if (response.ok) {
                    result += '<p class="success">✅ API call successful</p>';
                    result += `<pre>${JSON.stringify(responseData, null, 2)}</pre>`;
                } else {
                    result += '<p class="error">❌ API call failed</p>';
                    result += `<p><strong>Response:</strong></p><pre>${JSON.stringify(responseData, null, 2)}</pre>`;
                }
                
            } catch (error) {
                result += `<p class="error">❌ API test error: ${error.message}</p>`;
            }
            
            displayResult('apiTest', result);
        }

        function clearAuth() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            log('Auth data cleared', 'success');
            checkAuthState();
        }

        // Auto-check auth state on page load
        window.onload = function() {
            checkAuthState();
        };
    </script>
</body>
</html>
