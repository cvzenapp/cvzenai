# Nginx configuration for CVZen
# Place this file in /etc/nginx/sites-available/cvzen
# Then create symlink: sudo ln -s /etc/nginx/sites-available/cvzen /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name cvzen.in www.cvzen.in;  # Replace with your domain

    # Redirect HTTP to HTTPS (after SSL is set up)
    # return 301 https://$server_name$request_uri;

    # Root directory for static files
    root /var/www/cvzen/dist/spa;
    index index.html;

    # Correct MIME types for JavaScript modules
    types {
        application/javascript js mjs;
        text/css css;
        text/html html;
        image/png png;
        image/jpeg jpg jpeg;
        image/svg+xml svg;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # API proxy - forward to Express server
    location /api/ {
        proxy_pass http://localhost:3001;  # Your Express server port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html =404;
    }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

